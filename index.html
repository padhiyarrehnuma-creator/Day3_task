<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Registration Form</title>

<link rel="stylesheet"
href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="form-box">

<h2>Create Account</h2>

<form id="registerForm" novalidate>

<!-- Full Name -->

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="fullname"
placeholder=" "
required>

<label for="fullname">
Full Name
</label>

<small class="error"></small>

</div>

<!-- Email -->

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder=" "
required>

<label for="email">
Email Address
</label>

<small class="error"></small>

</div>

<!-- Password -->

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder=" "
required>

<label for="password">
Password
</label>

<span id="togglePassword">

<i class="fa-solid fa-eye"></i>

</span>

<small class="error"></small>

</div>

<div class="strength">

<div id="strengthBar"></div>

</div>

<p id="strengthText">

Password Strength

</p>

<!-- Confirm Password -->

<div class="input-box">

<i class="fa-solid fa-key"></i>

<input
type="password"
id="confirmPassword"
placeholder=" "
required>

<label for="confirmPassword">
Confirm Password
</label>

<span id="toggleConfirm">

<i class="fa-solid fa-eye"></i>

</span>

<small class="error"></small>

</div>

<!-- Gender -->

<div class="gender-box">

<label class="gender-title">

Gender

</label>

<div class="gender">

<label>

<input
type="radio"
name="gender"
value="Male"
required>

Male

</label>

<label>

<input
type="radio"
name="gender"
value="Female">

Female

</label>

<label>

<input
type="radio"
name="gender"
value="Other">

Other

</label>

</div>

<small class="error"></small>

</div>

<!-- Course -->

<div class="input-box">

<i class="fa-solid fa-graduation-cap"></i>

<select
id="course"
required>

<option value="">
Select Course
</option>

<option>
Frontend Development
</option>

<option>
Backend Development
</option>

<option>
Full Stack Development
</option>

<option>
UI / UX Design
</option>

<option>
Web Development
</option>

</select>

<small class="error"></small>

</div>

<!-- Phone Section -->

<label class="phone-label">

Phone Number

</label>

<div class="phone-container">

<div class="country-box">

<select id="countryCode">

<option value="+91">
🇮🇳 +91
</option>

<option value="+1">
🇺🇸 +1
</option>

<option value="+44">
🇬🇧 +44
</option>

<option value="+971">
🇦🇪 +971
</option>

<option value="+81">
🇯🇵 +81
</option>

</select>

</div>

<div class="phone-box">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
id="phone"
placeholder="Enter Phone Number"
maxlength="10"
required>

<small class="error"></small>

</div>

  </div>
  <!-- Address -->

<div class="input-box">

    <i class="fa-solid fa-location-dot"></i>

    <textarea
        id="address"
        rows="4"
        placeholder=" "
        required></textarea>

    <label for="address">
        Address
    </label>

    <small class="error"></small>

</div>

<!-- Terms & Conditions -->

<div class="checkbox-box">

    <label>

        <input
            type="checkbox"
            id="terms"
            required>

        I agree to the
        <a href="#">Terms & Conditions</a>

    </label>

    <small class="error"></small>

</div>

<!-- Register Button -->

<div class="button-box">

    <button
        type="submit"
        id="registerBtn">

        <i class="fa-solid fa-user-plus"></i>

        Register Now

    </button>

</div>

</form>

</div>

</div>

<!-- Success Popup -->

<div class="popup" id="popup">

    <div class="popup-content">

        <i class="fa-solid fa-circle-check success-icon"></i>

        <h2>Registration Successful!</h2>

        <p>
            Your account has been created successfully.
        </p>

        <button
            type="button"
            id="okBtn">

            OK

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
